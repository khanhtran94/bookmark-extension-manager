<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Trang quan ly Bookmark</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 14px 18px;
      width: 100%;
      max-width: none;
      margin: 0;
      box-sizing: border-box;
      background: #f7f7f7;
    }

    h1 {
      margin-bottom: 20px;
    }

    .toolbar {
      margin-bottom: 20px;
    }

    .toolbar-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .org-panel {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
      padding: 12px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .control-group label {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .control-group select,
    .control-group input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px;
      font-size: 13px;
    }

    .manager-layout {
      display: grid;
      grid-template-columns: clamp(220px, 18vw, 300px) minmax(0, 1fr) clamp(220px, 18vw, 300px);
      gap: 16px;
      align-items: start;
    }

    .sidebar,
    .tag-sidebar {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      position: sticky;
      top: 12px;
      max-height: calc(100vh - 24px);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2,
    .tag-sidebar h2,
    .content h2 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .folder-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }

    .folder-tree {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
      overflow-y: auto;
      padding-right: 4px;
      flex: 1;
      min-height: 180px;
    }

    .folder-root,
    .folder-child,
    .folder-all-btn {
      border: 1px solid #d7d7d7;
      border-radius: 6px;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      width: 100%;
      padding: 8px 10px;
    }

    .folder-root.active,
    .folder-child.active,
    .folder-all-btn.active {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: bold;
    }

    .folder-children {
      display: none;
      margin-left: 10px;
      border-left: 2px solid #ececec;
      padding-left: 8px;
      gap: 6px;
    }

    .folder-children.open {
      display: grid;
    }

    .folder-rename {
      display: grid;
      gap: 8px;
      border-top: 1px dashed #ddd;
      padding-top: 10px;
    }

    .folder-rename label {
      font-size: 12px;
      color: #666;
    }

    .folder-rename input {
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .folder-rename button {
      border: none;
      border-radius: 6px;
      background: #ff9800;
      color: white;
      font-size: 13px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .folder-rename button:disabled {
      background: #c7c7c7;
      cursor: not-allowed;
    }

    #deleteFolderBtn {
      background: #e74c3c;
    }

    .content {
      min-width: 0;
    }

    .tag-filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      overflow-y: auto;
      padding-right: 4px;
      align-content: flex-start;
      min-height: 180px;
      flex: 1;
    }

    .tag-filter-btn {
      border: 1px solid #d7d7d7;
      border-radius: 999px;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
    }

    .tag-filter-btn.active {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: bold;
    }

    .bookmarks-panel {
      background: transparent;
    }

    .view-tabs-panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: grid;
      gap: 10px;
    }

    .view-tabs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .view-tab-btn {
      border: 1px solid #d7d7d7;
      border-radius: 999px;
      background: white;
      color: #333;
      cursor: pointer;
      font-size: 12px;
      padding: 6px 10px;
    }

    .view-tab-btn.active {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: bold;
    }

    .view-tab-editor {
      display: flex;
      gap: 8px;
    }

    .view-tab-editor input {
      flex: 1;
      padding: 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }

    .view-tab-editor button {
      border: none;
      border-radius: 6px;
      background: #5c6bc0;
      color: white;
      font-size: 13px;
      padding: 8px 10px;
      cursor: pointer;
    }

    .pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .pagination button {
      border: 1px solid #ccc;
      background: white;
      color: #333;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      font-size: 13px;
      color: #555;
    }

    .folder-create {
      display: grid;
      gap: 8px;
    }

    .folder-create button {
      border: none;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      cursor: pointer;
      background: #5c6bc0;
      color: white;
    }

    .import-actions {
      display: grid;
      gap: 8px;
    }

    .import-actions button {
      border: none;
      border-radius: 6px;
      padding: 9px 10px;
      font-size: 13px;
      cursor: pointer;
      background: #009688;
      color: white;
    }

    .import-status {
      font-size: 12px;
      color: #555;
      min-height: 16px;
    }

    .view-menu {
      display: flex;
      gap: 8px;
      align-items: center;
      white-space: nowrap;
    }

    .time-view-control {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .time-view-control span {
      font-size: 13px;
      color: #666;
      white-space: nowrap;
    }

    .time-view-control select {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      background: white;
    }

    .view-menu span {
      font-size: 13px;
      color: #666;
    }

    .view-btn {
      border: 1px solid #bbb;
      border-radius: 6px;
      background: white;
      color: #333;
      padding: 8px 10px;
      cursor: pointer;
      font-size: 13px;
    }

    .view-btn.active {
      border-color: #1a73e8;
      background: #e8f0fe;
      color: #1a73e8;
      font-weight: bold;
    }

    #bookmarkList.card-view {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }

    .bookmark-item {
      background: white;
      border: 1px solid #ddd;
      padding: 14px;
      border-radius: 8px;
      margin-bottom: 12px;
    }

    #bookmarkList.card-view .bookmark-item {
      margin-bottom: 0;
    }

    .bookmark-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .bookmark-url {
      font-size: 13px;
      color: #555;
      word-break: break-all;
      margin-bottom: 8px;
    }

    .bookmark-meta {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 10px;
    }

    .tag-chip {
      background: #e8f0fe;
      color: #1a73e8;
      font-size: 12px;
      border-radius: 999px;
      padding: 4px 8px;
    }

    .tag-editor {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .tag-editor input {
      flex: 1;
      padding: 8px;
      font-size: 13px;
    }

    .tag-editor button {
      width: auto;
      margin-bottom: 0;
      padding: 8px 10px;
      background: #ff9800;
      color: white;
    }

    .folder-editor {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .folder-editor select {
      flex: 1;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
      padding: 8px;
      box-sizing: border-box;
    }

    .folder-editor button {
      width: auto;
      margin-bottom: 0;
      padding: 8px 10px;
      background: #5c6bc0;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .actions button {
      margin-right: 8px;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .open-btn {
      background: #4caf50;
    }

    .delete-btn {
      background: #e74c3c;
    }

    .empty {
      color: #666;
      margin-top: 20px;
    }

    .bookmark-card .bookmark-title {
      font-size: 16px;
      margin-bottom: 10px;
      min-height: 38px;
      overflow: hidden;
    }

    .bookmark-card .actions {
      margin-top: 10px;
    }

    .card-tag-input-wrap {
      display: flex;
      gap: 6px;
      margin-bottom: 10px;
      align-items: center;
    }

    .add-tag-btn {
      border: none;
      border-radius: 999px;
      width: 26px;
      height: 26px;
      line-height: 26px;
      text-align: center;
      cursor: pointer;
      background: #1a73e8;
      color: white;
      font-size: 16px;
      padding: 0;
    }

    .card-tag-input {
      display: none;
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      box-sizing: border-box;
    }

    .card-tag-input.open {
      display: block;
    }

    .bookmark-card .folder-editor {
      margin-top: 8px;
      margin-bottom: 8px;
    }

    @media (max-width: 960px) {
      .manager-layout {
        grid-template-columns: 1fr;
      }

      .sidebar,
      .tag-sidebar {
        position: static;
        max-height: none;
      }

      .folder-tree,
      .tag-filter-chips {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <h1>Quan ly Bookmark</h1>

  <div class="toolbar">
    <div class="toolbar-row">
      <input id="searchInput" type="text" placeholder="Tim theo tieu de, URL hoac tag..." />
      <div class="time-view-control">
        <span>Created:</span>
        <select id="createdViewSelect">
          <option value="newest">Moi nhat</option>
          <option value="oldest">Cu nhat</option>
          <option value="today">Hom nay</option>
          <option value="last7">7 ngay qua</option>
          <option value="last30">30 ngay qua</option>
        </select>
      </div>
      <div class="view-menu">
        <span>View:</span>
        <button id="listViewBtn" class="view-btn active" data-view-mode="list" type="button">List</button>
        <button id="cardViewBtn" class="view-btn" data-view-mode="card" type="button">Card</button>
      </div>
    </div>
  </div>

  <div class="org-panel">
    <div class="control-group folder-create">
      <label for="newFolderName">Tao folder</label>
      <input id="newFolderName" type="text" placeholder="Ten folder moi..." />
      <button id="createFolderBtn" type="button">Tao folder</button>
    </div>
    <div class="control-group import-actions">
      <label for="importFileInput">Import Chrome bookmark (.html)</label>
      <input id="importFileInput" type="file" accept=".html,text/html" />
      <button id="importBtn" type="button">Import bookmark</button>
      <div id="importStatus" class="import-status"></div>
    </div>
  </div>

  <div class="manager-layout">
    <aside class="sidebar">
      <h2>Folder</h2>
      <div class="folder-actions">
        <button id="folderAllBtn" class="folder-all-btn active" type="button" data-folder-id="__all">Tat ca folder</button>
        <button id="folderNoneBtn" class="folder-all-btn" type="button" data-folder-id="__none">Chua gan folder</button>
      </div>
      <div id="folderTree" class="folder-tree"></div>
      <div class="folder-rename">
        <label for="renameFolderInput">Sua ten folder dang chon</label>
        <input id="renameFolderInput" type="text" placeholder="Chon folder de doi ten..." />
        <button id="renameFolderBtn" type="button" disabled>Sua ten folder</button>
        <button id="deleteFolderBtn" type="button" disabled>Xoa folder dang chon</button>
      </div>
    </aside>

    <section class="content">
      <div class="bookmarks-panel">
        <div class="view-tabs-panel">
          <div id="viewTabChips" class="view-tabs-row"></div>
          <div class="view-tab-editor">
            <input id="newViewTabInput" type="text" placeholder="Them tab view (Daily, AI, noteLLM...)" />
            <button id="addViewTabBtn" type="button">Them tab</button>
          </div>
        </div>
        <div id="bookmarkList"></div>
        <div class="pagination">
          <button id="prevPageBtn" type="button">Prev</button>
          <span id="pageInfo" class="pagination-info">Trang 1/1</span>
          <button id="nextPageBtn" type="button">Next</button>
        </div>
      </div>
    </section>

    <aside class="tag-sidebar">
      <h2>Tag Filter</h2>
      <div id="tagFilterChips" class="tag-filter-chips"></div>
    </aside>
  </div>

  <script src="bookmark-db.js"></script>
  <script src="manager.js"></script>
</body>
</html>
