<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bookmark Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 300px;
      padding: 12px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    .field {
      margin-bottom: 10px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #555;
      margin-bottom: 4px;
    }

    .field input {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }

    #saveBtn {
      background: #4caf50;
      color: white;
    }

    #openManagerBtn {
      background: #2196f3;
      color: white;
      margin-bottom: 0;
    }

    #message {
      font-size: 13px;
      color: #333;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <h2>Bookmark Manager</h2>

  <div class="field">
    <label for="tagsInput">Tag (phan cach bang dau phay)</label>
    <input id="tagsInput" type="text" placeholder="vd: cong-viec, javascript" list="tagSuggestions" />
    <datalist id="tagSuggestions"></datalist>
  </div>

  <div class="field">
    <label for="folderInput">Folder</label>
    <input id="folderInput" type="text" placeholder="Nhap de goi y folder..." list="folderSuggestions" />
    <datalist id="folderSuggestions"></datalist>
  </div>

  <button id="saveBtn">Luu tab hien tai</button>
  <button id="openManagerBtn">Mo trang quan ly</button>

  <div id="message"></div>

  <script src="bookmark-db.js"></script>
  <script src="popup.js"></script>
</body>
</html>
