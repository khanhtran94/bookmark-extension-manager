<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Bookmark Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      width: 320px;
      padding: 12px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    button {
      padding: 8px 12px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    .bookmark-item {
      border: 1px solid #ddd;
      padding: 8px;
      margin-bottom: 8px;
      border-radius: 6px;
    }

    .bookmark-title {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .bookmark-url {
      font-size: 12px;
      color: #555;
      word-break: break-all;
      margin-bottom: 6px;
    }

    .delete-btn {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>Bookmark Manager</h2>
  <button id="saveBtn">Lưu tab hiện tại</button>
  <div id="bookmarkList"></div>

  <script src="popup.js"></script>
</body>
</html>
